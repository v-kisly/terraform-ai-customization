# Terraform Checker Configuration
# Format: KEY=VALUE
# Lines starting with # are comments; blank lines are ignored

# --- Checks (true/false) ---
CHECK_FMT=true
CHECK_INIT=true
CHECK_VALIDATE=true
CHECK_TFLINT=true
CHECK_TFSEC=true

# --- Docker ---
# Set DOCKER_SKIP=true to skip all Docker-based checks (tflint, tfsec)
DOCKER_SKIP=false

# --- TFLint Docker image ---
TFLINT_REGISTRY=ghcr.io
TFLINT_IMAGE=terraform-linters/tflint
TFLINT_TAG=latest

# --- tfsec Docker image ---
TFSEC_REGISTRY=docker.io
TFSEC_IMAGE=aquasec/tfsec
TFSEC_TAG=latest
